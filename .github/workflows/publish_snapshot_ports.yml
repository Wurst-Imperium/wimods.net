name: Publish Snapshot Mod Ports

on:
  workflow_dispatch:
    inputs:
      mc_version:
        description: "Minecraft version (leave blank to auto detect)"
        required: false
      branch:
        description: "Branch for the current snapshot cycle (leave blank to auto detect)"
        required: false
      mods:
        description: "Space-separated list of mods to include (see data/mods.json)"
        type: string
        required: true
      announce:
        description: "Announce the snapshot port(s) on WurstForum"
        type: boolean
        default: true
      announce_only:
        description: "Only announce, don't publish"
        type: boolean
        default: false
      dry_run:
        description: "Don't actually publish or announce anything"
        type: boolean
        default: false
      distinct_id:
        type: string
        required: false

permissions:
  # To checkout data/mods.json
  contents: read

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      mc_version: ${{ steps.get_mc_version.outputs.mc_version }}
      branch: ${{ steps.get_branch.outputs.branch }}
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
    - name: Echo distinct ID ${{ inputs.distinct_id }}
      run: echo ${{ inputs.distinct_id }}
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Build mod matrix
      id: set_matrix
      env:
        MODS: ${{ inputs.mods }}
      run: |
        if [[ "$MODS" == "all" ]]; then
          matrix=$(jq -c '{mod: to_entries | map(select(.value.supports_snapshots) | .value + {id: .key})}' data/mods.json)
        else
          read -ra mods_array <<< "$MODS"
          ids_json=$(jq -cn '$ARGS.positional' --args "${mods_array[@]}")
          matrix=$(jq -c --argjson ids "$ids_json" '{mod: [
            $ids[] as $id
            | (.[$id] // error("Unknown mod ID: " + $id)) as $mod
            | if $mod.supports_snapshots then
                $mod + {id: $id}
              else
                error("Mod does not support snapshots: " + $id)
              end
          ]}' data/mods.json)
        fi

        selected_mods=$(jq -r '.mod[].id' <<< "$matrix" | paste -sd' ' -)
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
        echo "Selected mods: $selected_mods"
        echo "Selected mods: \`$selected_mods\`" >> "$GITHUB_STEP_SUMMARY"

        if [[ -z "$selected_mods" ]]; then
          echo "::error::No mods selected"
          echo "No mods selected." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
    - name: Get Minecraft version
      id: get_mc_version
      run: |
        MC_VERSION="${{ inputs.mc_version }}"
        if [ -z "$MC_VERSION" ]; then
          RESPONSE=$(curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json)
          MC_VERSION=$(echo "$RESPONSE" | jq -r '.latest.snapshot')
          if [ -z "$MC_VERSION" ]; then
            echo "No latest Minecraft snapshot found"
            echo "Response: $RESPONSE"
            exit 1
          fi
        fi
        echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT
        echo "Minecraft version: \`$MC_VERSION\`" >> $GITHUB_STEP_SUMMARY
    - name: Get branch for current snapshot cycle
      id: get_branch
      run: |
        BRANCH="${{ inputs.branch }}"
        if [ -z "$BRANCH" ]; then
          MC_VERSION="${{ steps.get_mc_version.outputs.mc_version }}"
          BRANCH="${MC_VERSION%%-*}"
        fi
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "Branch: \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY

  wi_mods:
    name: ${{ matrix.mod.name }}
    needs: prepare
    runs-on: ubuntu-latest
    if: ${{ !inputs.announce_only && !inputs.dry_run }}
    strategy:
      # If something goes wrong, all published files have to be manually deleted.
      # Best to fail as early as possible.
      fail-fast: true
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
    - name: Trigger publish workflow
      uses: Wurst-Imperium/dispatch-and-wait@v1
      with:
        token: ${{ secrets.SNAPSHOT_MODS_ACTIONS_TOKEN }}
        owner: Wurst-Imperium
        repo: ${{ matrix.mod.github_repo }}
        ref: ${{ needs.prepare.outputs.branch }}
        workflow: publish.yml
        workflow_inputs: |
          {
            "close_milestone": "false",
            "upload_backups": "true",
            "publish_github": "true",
            "publish_curseforge": "true",
            "publish_modrinth": "true",
            "update_website": "true"
          }
        run_timeout_seconds: 600  # 10 minutes

  announce:
    runs-on: ubuntu-latest
    needs: [wi_mods, prepare]
    if: ${{ always() && !cancelled() && inputs.announce && needs.prepare.result == 'success' && (inputs.dry_run || inputs.announce_only || needs.wi_mods.result == 'success') }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: scripts/requirements.txt
    - name: Install dependencies
      run: pip install -r scripts/requirements.txt
    - name: Run announce_snapshot_ports.py
      env:
        WURSTFORUM_TOKEN: ${{ secrets.WF_BOT_TOKEN }}
      run: |
        python scripts/announce_snapshot_ports.py \
          ${{ needs.prepare.outputs.mc_version }} \
          ${{ needs.prepare.outputs.branch }} \
          $(jq -r '.mod[].id' <<< '${{ needs.prepare.outputs.matrix }}') \
          ${{ inputs.dry_run && '--dry-run' || '' }}
