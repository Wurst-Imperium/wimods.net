name: Run Auto Snapshot Update Workflows

on:
  workflow_dispatch:
    inputs:
      mc_version:
        description: "Minecraft version (leave blank to auto detect)"
        required: false
      branch:
        description: "Branch for the current snapshot cycle (leave blank to auto detect)"
        required: false
      cf_game_version:
        description: "CurseForge game version (leave blank to auto detect)"
        required: false
      fapi_version:
        description: "Fabric API version (leave blank to auto detect)"
        required: false
      mods:
        description: "Space-separated list of mods to include (see data/mods.json, default: all)"
        type: string
        default: "all"
      auto_publish:
        description: "Automatically publish mods that were successfully updated"
        type: boolean
        default: false
      dry_run:
        description: "Don't actually start an update or publish anything"
        type: boolean
        default: false

permissions:
  # To checkout data/mods.json
  contents: read
  # To dispatch publish_snapshot_ports.yml with github.token and read this run's jobs via GitHub API
  actions: write

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      mc_version: ${{ steps.get_mc_version.outputs.mc_version }}
      branch: ${{ steps.get_branch.outputs.branch }}
      cf_game_version: ${{ steps.get_snapshot_cycle_info.outputs.cf_game_version }}
      loader_version: ${{ steps.get_loader_version.outputs.loader_version }}
      fapi_version: ${{ steps.get_fapi_version.outputs.fapi_version }}
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    - name: Build mod matrix
      id: set_matrix
      env:
        MODS: ${{ inputs.mods }}
      run: |
        if [[ "$MODS" == "all" ]]; then
          matrix=$(jq -c '{mod: to_entries | map(select(.value.supports_snapshots) | .value + {id: .key})}' data/mods.json)
        else
          read -ra mods_array <<< "$MODS"
          ids_json=$(jq -cn '$ARGS.positional' --args "${mods_array[@]}")
          matrix=$(jq -c --argjson ids "$ids_json" '{mod: [
            $ids[] as $id
            | (.[$id] // error("Unknown mod ID: " + $id)) as $mod
            | if $mod.supports_snapshots then
                $mod + {id: $id}
              else
                error("Mod does not support snapshots: " + $id)
              end
          ]}' data/mods.json)
        fi

        selected_mods=$(jq -r '.mod[].id' <<< "$matrix" | paste -sd' ' -)
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
        echo "Selected mods: $selected_mods"
        echo "Selected mods: \`$selected_mods\`" >> "$GITHUB_STEP_SUMMARY"

        if [[ -z "$selected_mods" ]]; then
          echo "::error::No mods selected"
          echo "No mods selected." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
    - name: Get Minecraft version
      id: get_mc_version
      run: |
        MC_VERSION="${{ inputs.mc_version }}"
        if [ -z "$MC_VERSION" ]; then
          RESPONSE=$(curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json)
          MC_VERSION=$(echo "$RESPONSE" | jq -r '.latest.snapshot')
          if [ -z "$MC_VERSION" ]; then
            echo "No latest Minecraft snapshot found"
            echo "Response: $RESPONSE"
            exit 1
          fi
        fi
        echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT
        echo "Minecraft version: \`$MC_VERSION\`" >> $GITHUB_STEP_SUMMARY
    - name: Get branch for current snapshot cycle
      id: get_branch
      run: |
        BRANCH="${{ inputs.branch }}"
        if [ -z "$BRANCH" ]; then
          MC_VERSION="${{ steps.get_mc_version.outputs.mc_version }}"
          BRANCH="${MC_VERSION%%-*}"
        fi
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "Branch: \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY
    - name: Get snapshot cycle info
      id: get_snapshot_cycle_info
      run: |
        CF_GAME_VERSION="${{ inputs.cf_game_version }}"
        if [ -z "$CF_GAME_VERSION" ]; then
          CF_GAME_VERSION=$(jq -r '.curseforge_game_version' data/current_snapshot_cycle.json)
        fi
        echo "cf_game_version=$CF_GAME_VERSION" >> $GITHUB_OUTPUT
        echo "CurseForge game version: \`$CF_GAME_VERSION\`" >> $GITHUB_STEP_SUMMARY
    - name: Get Loader version
      id: get_loader_version
      run: |
        RESPONSE=$(curl -s \
          "https://meta.fabricmc.net/v2/versions/loader/${{ steps.get_mc_version.outputs.mc_version }}")
        if [ "$(echo "$RESPONSE" | jq length)" -gt 0 ]; then
          LOADER_VERSION=$(echo "$RESPONSE" | jq -r '.[0].loader.version')
          echo "loader_version=$LOADER_VERSION" >> $GITHUB_OUTPUT
          echo "Loader version: \`$LOADER_VERSION\`" >> $GITHUB_STEP_SUMMARY
        else
          echo "No loader version found for ${{ steps.get_mc_version.outputs.mc_version }}"
          echo "Response: $RESPONSE"
          exit 1
        fi
    - name: Get Fabric API version
      id: get_fapi_version
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        FAPI_VERSION="${{ inputs.fapi_version }}"
        if [ -z "$FAPI_VERSION" ]; then
          TARGET_RELEASE="${{ steps.get_branch.outputs.branch }}"
          RESPONSE=$(gh api \
            "repos/FabricMC/fabric-api/releases?per_page=100")
          FAPI_VERSION=$(echo "$RESPONSE" \
            | jq -r --arg SUFFIX "+$TARGET_RELEASE" \
            '.[] | select(.tag_name | endswith($SUFFIX)) | .tag_name' \
            | head -n 1)
          if [ -z "$FAPI_VERSION" ]; then
            echo "No Fabric API version found ending with +$TARGET_RELEASE"
            echo "Response: $RESPONSE"
            exit 1
          fi
        fi
        echo "fapi_version=$FAPI_VERSION" >> $GITHUB_OUTPUT
        echo "Fabric API version: \`$FAPI_VERSION\`" >> $GITHUB_STEP_SUMMARY
    - name: Mark workflow as started
      if: ${{ !inputs.dry_run }}
      run: |
        curl -X POST \
          -H "Content-Type: application/json" \
          -H "x-api-key: ${{ secrets.WI_BACKUPS_API_KEY }}" \
          -d "{\"mc_version\": \"${{ steps.get_mc_version.outputs.mc_version }}\", \"run_id\": \"${{ github.run_id }}\"}" \
          https://api.wurstclient.net/webhooks/snapshot/auto_update_started

  wi_mods:
    name: ${{ matrix.mod.id }}
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
    - name: Trigger snapshot update workflow
      uses: Wurst-Imperium/dispatch-and-wait@v1
      with:
        token: ${{ secrets.SNAPSHOT_MODS_ACTIONS_TOKEN }}
        owner: Wurst-Imperium
        repo: ${{ matrix.mod.github_repo }}
        ref: ${{ needs.prepare.outputs.branch }}
        workflow: auto_snapshot_update.yml
        workflow_inputs: |
          {
            "mc_version": "${{ needs.prepare.outputs.mc_version }}",
            "fabric_loader": "${{ needs.prepare.outputs.loader_version }}",
            "fapi_version": "${{ needs.prepare.outputs.fapi_version }}",
            "cf_game_version": "${{ needs.prepare.outputs.cf_game_version }}"
          }
        run_timeout_seconds: 1200  # 20 minutes

  auto_publish:
    runs-on: ubuntu-latest
    needs: [prepare, wi_mods]
    if: ${{ always() && !cancelled() && !inputs.dry_run && inputs.auto_publish && needs.prepare.result == 'success' }}
    steps:
    - name: Find successfully updated mods
      id: successful_mods
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        jobs_json=$(gh api \
          "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100")
        selected_ids_json=$(jq -c '[.mod[].id]' <<< '${{ needs.prepare.outputs.matrix }}')
        mods=$(jq -r --argjson selected "$selected_ids_json" '
          .jobs[]
          | select(.conclusion == "success")
          | select(.name as $name | $selected | index($name))
          | .name
        ' <<< "$jobs_json" | paste -sd' ' -)
        echo "Successfully updated mods: ${mods:-none}"
        echo "mods=$mods" >> "$GITHUB_OUTPUT"
    - name: Fail if all updates failed
      if: ${{ steps.successful_mods.outputs.mods == '' }}
      run: |
        echo "::error::All updates failed. Nothing to publish."
        echo "All updates failed. Nothing to publish." >> "$GITHUB_STEP_SUMMARY"
        exit 1
    - name: Trigger publish snapshot ports workflow
      uses: Wurst-Imperium/dispatch-and-wait@v1
      with:
        token: ${{ github.token }}
        owner: Wurst-Imperium
        repo: wimods.net
        ref: master
        workflow: publish_snapshot_ports.yml
        workflow_inputs: |
          {
            "mc_version": "${{ needs.prepare.outputs.mc_version }}",
            "branch": "${{ needs.prepare.outputs.branch }}",
            "mods": "${{ steps.successful_mods.outputs.mods }}"
          }
        run_timeout_seconds: 1200  # 20 minutes
